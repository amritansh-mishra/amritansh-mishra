name: Generate Wave Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate SVG
        run: |
          mkdir -p dist
          cat << 'EOF' > dist/wave.svg
          <svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#0d1117"/>

            <g>
              <circle cx="50" cy="100" r="12" fill="#58a6ff">
                <animate attributeName="cy"
                         values="100;60;100"
                         dur="2s"
                         repeatCount="indefinite"/>
              </circle>

              <circle cx="120" cy="100" r="12" fill="#58a6ff">
                <animate attributeName="cy"
                         values="100;140;100"
                         dur="2s"
                         begin="0.2s"
                         repeatCount="indefinite"/>
              </circle>

              <circle cx="190" cy="100" r="12" fill="#58a6ff">
                <animate attributeName="cy"
                         values="100;60;100"
                         dur="2s"
                         begin="0.4s"
                         repeatCount="indefinite"/>
              </circle>

              <circle cx="260" cy="100" r="12" fill="#58a6ff">
                <animate attributeName="cy"
                         values="100;140;100"
                         dur="2s"
                         begin="0.6s"
                         repeatCount="indefinite"/>
              </circle>

              <circle cx="330" cy="100" r="12" fill="#58a6ff">
                <animate attributeName="cy"
                         values="100;60;100"
                         dur="2s"
                         begin="0.8s"
                         repeatCount="indefinite"/>
              </circle>
            </g>

            <text x="50%" y="180"
                  text-anchor="middle"
                  fill="#c9d1d9"
                  font-size="24"
                  font-family="Arial">
              Coding Waves 🌊
            </text>
          </svg>
          EOF

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
