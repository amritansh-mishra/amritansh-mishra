name: GitHub Profile Intelligence Dashboard
on:
  # Schedule the workflow to run every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allow manual triggering
  workflow_dispatch:
  # Trigger on pushes to main
  push:
    branches:
      - main

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Create the dashboard generation script
      - name: Create Dashboard Script
        run: |
          mkdir -p dist
          cat > generate-dashboard.js << 'SCRIPT_EOF'
          const fs = require('fs');
          const https = require('https');
          
          async function fetchGitHubStats() {
            const username = process.env.GITHUB_ACTOR;
            
            // Fetch user data
            const userUrl = `https://api.github.com/users/${username}`;
            const reposUrl = `https://api.github.com/users/${username}/repos?per_page=100&sort=updated`;
            
            const headers = {
              'Authorization': `token ${process.env.GITHUB_TOKEN}`,
              'User-Agent': 'GitHub-Actions'
            };
            
            async function makeRequest(url) {
              return new Promise((resolve, reject) => {
                https.get(url, { headers }, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve(JSON.parse(data)));
                }).on('error', reject);
              });
            }
            
            const userData = await makeRequest(userUrl);
            const reposData = await makeRequest(reposUrl);
            
            const stats = {
              followers: userData.followers,
              repos: userData.public_repos,
              gists: userData.public_gists,
              bio: userData.bio || 'Developer',
              name: userData.name || username
            };
            
            const languages = {};
            const topRepos = [];
            
            reposData.forEach(repo => {
              if (!repo.fork) {
                topRepos.push({
                  name: repo.name,
                  stars: repo.stargazers_count,
                  language: repo.language || 'Other'
                });
                if (repo.language) {
                  languages[repo.language] = (languages[repo.language] || 0) + 1;
                }
              }
            });
            
            topRepos.sort((a, b) => b.stars - a.stars);
            const sortedLangs = Object.entries(languages).sort((a, b) => b[1] - a[1]).slice(0, 5);
            
            let svg = '<?xml version="1.0" encoding="UTF-8"?>';
            svg += '<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">';
            svg += '<defs>';
            svg += '<linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">';
            svg += '<stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />';
            svg += '<stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />';
            svg += '</linearGradient>';
            svg += '<linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">';
            svg += '<stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />';
            svg += '<stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />';
            svg += '</linearGradient>';
            svg += '<filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
            svg += '</defs>';
            svg += '<rect width="1000" height="600" fill="#0d1117"/>';
            svg += '<rect width="1000" height="150" fill="url(#headerGrad)"/>';
            svg += `<text x="50" y="60" font-size="48" font-weight="bold" fill="white" font-family="Arial">${stats.name}</text>`;
            svg += `<text x="50" y="95" font-size="18" fill="#e0e0e0" font-family="Arial">${stats.bio}</text>`;
            svg += `<rect x="50" y="110" width="140" height="25" fill="rgba(255,255,255,0.1)" rx="4"/><text x="65" y="130" font-size="14" fill="white" font-family="Arial">👥 ${stats.followers} Followers</text>`;
            svg += `<rect x="220" y="110" width="140" height="25" fill="rgba(255,255,255,0.1)" rx="4"/><text x="235" y="130" font-size="14" fill="white" font-family="Arial">📦 ${stats.repos} Repos</text>`;
            svg += `<rect x="390" y="110" width="140" height="25" fill="rgba(255,255,255,0.1)" rx="4"/><text x="405" y="130" font-size="14" fill="white" font-family="Arial">✨ ${stats.gists} Gists</text>`;
            svg += '<text x="50" y="200" font-size="22" font-weight="bold" fill="white" font-family="Arial">Top Languages</text>';
            
            let yPos = 240;
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#fa8072'];
            
            sortedLangs.forEach((lang, idx) => {
              const percentage = (lang[1] / topRepos.length) * 100;
              const barWidth = (percentage / 100) * 500;
              svg += `<text x="50" y="${yPos}" font-size="14" fill="#e0e0e0" font-family="Arial">${lang[0]}</text>`;
              svg += `<rect x="200" y="${yPos - 12}" width="500" height="14" fill="rgba(255,255,255,0.1)" rx="7"/>`;
              svg += `<rect x="200" y="${yPos - 12}" width="${barWidth}" height="14" fill="${colors[idx % colors.length]}" rx="7" filter="url(#glow)"/>`;
              svg += `<text x="720" y="${yPos}" font-size="12" fill="#999" font-family="Arial">${lang[1]} projects</text>`;
              yPos += 35;
            });
            
            svg += '<text x="50" y="450" font-size="22" font-weight="bold" fill="white" font-family="Arial">Top Repositories</text>';
            
            let xPos = 50;
            topRepos.slice(0, 4).forEach((repo) => {
              svg += `<g filter="url(#glow)"><rect x="${xPos}" y="480" width="220" height="100" fill="rgba(102,126,234,0.1)" rx="8" stroke="url(#accentGrad)" stroke-width="2"/>`;
              svg += `<text x="${xPos + 15}" y="505" font-size="14" font-weight="bold" fill="white" font-family="Arial">${repo.name.substring(0, 20)}</text>`;
              svg += `<text x="${xPos + 15}" y="530" font-size="12" fill="#999" font-family="Arial">Language: ${repo.language || 'Unknown'}</text>`;
              svg += `<text x="${xPos + 15}" y="560" font-size="13" fill="#f5576c" font-family="Arial">⭐ ${repo.stars} Stars</text></g>`;
              xPos += 240;
            });
            
            svg += '</svg>';
            fs.writeFileSync('dist/profile-dashboard.svg', svg);
            console.log('✅ Dashboard generated successfully!');
          }
          
          fetchGitHubStats().catch(err => {
            console.error('Error:', err);
            process.exit(1);
          });
          SCRIPT_EOF

      # Step 3: Run the dashboard generation script
      - name: Generate Profile Analytics Dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.repository_owner }}
        run: node generate-dashboard.js

      # Step 4: Deploy generated files
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "✨ Update profile dashboard [skip ci]"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

      # Step 5: Workflow completion notification
      - name: Notify Workflow Completion
        run: |
          echo "✅ Profile Intelligence Dashboard generated successfully!"
          echo "📈 Dashboard includes:"
          echo "  • Real-time follower & repository counts"
          echo "  • Language distribution analysis"
          echo "  • Top repositories ranking"
          echo "  • Animated gradients & glowing effects"
