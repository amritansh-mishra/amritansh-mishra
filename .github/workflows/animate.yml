name: Generate Premium Profile Animation
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Generate Premium SVG Animation
        run: |
          mkdir -p dist
          cat > dist/premium-animation.svg << 'SVGEOF'
<svg width="1000" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0a0e27"/>
  <g opacity="0.3">
    <path d="M 0,0 Q 250,100 500,0 T 1000,0 L 1000,200 Q 750,100 500,200 T 0,200 Z" fill="url(#grad1)" filter="url(#blur)">
      <animate attributeName="d" values="M 0,0 Q 250,100 500,0 T 1000,0 L 1000,200 Q 750,100 500,200 T 0,200 Z;M 0,50 Q 250,50 500,50 T 1000,50 L 1000,250 Q 750,150 500,250 T 0,250 Z;M 0,0 Q 250,100 500,0 T 1000,0 L 1000,200 Q 750,100 500,200 T 0,200 Z" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>
  <circle cx="150" cy="100" r="40" fill="url(#glow1)" filter="url(#glow)">
    <animate attributeName="cx" values="150;250;150" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;200;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="300" r="50" fill="url(#glow1)" opacity="0.5" filter="url(#glow)">
    <animate attributeName="cx" values="850;700;850" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="300;150;300" dur="7s" repeatCount="indefinite"/>
  </circle>
  <g id="particles">
    <circle cx="200" cy="150" r="3" fill="#00d4ff" opacity="0.8">
      <animate attributeName="cx" values="200;350;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;250;150" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="200" r="2.5" fill="#7c3aed" opacity="0.7">
      <animate attributeName="cx" values="400;550;400" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;100;200" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="100" r="2" fill="#ff006e" opacity="0.6">
      <animate attributeName="cx" values="600;700;600" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;300;100" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="250" r="2.5" fill="#00d4ff" opacity="0.5">
      <animate attributeName="cx" values="300;500;300" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="250;150;250" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="200" r="2" fill="#7c3aed" opacity="0.7">
      <animate attributeName="cx" values="750;850;750" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;100;200" dur="5.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="50%" y="60" text-anchor="middle" fill="#00d4ff" font-size="48" font-weight="bold" font-family="'Segoe UI', Courier, monospace" filter="url(#glow)">
    CRAFTING EXCELLENCE
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="50%" y="320" text-anchor="middle" fill="#c9d1d9" font-size="20" font-family="'Segoe UI', Courier, monospace" opacity="0.8">
    Building with passion - Innovating with purpose
  </text>
  <rect x="50" y="350" width="900" height="2" fill="url(#grad1)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
SVGEOF
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
